<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sơ đồ Dạ Tiệc Ánh Sáng Biển Đêm</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
  :root{
    --navy:#0a1a3a; --navy2:#13294f;
    --amber:#3a2f1c; --amber2:#5a4326;
    --gold:#E9C46A; --coral:#E07A5F; --leaf:#A9D08E;
    --red1:#a8341f; --red2:#6e1f12;
    --green1:#4a6b2a; --green2:#2f471a;
    --ink:#fbf3df; --muted:#c9c0aa;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:"Segoe UI", Arial, "Helvetica Neue", sans-serif;
    background:linear-gradient(180deg, var(--navy) 0%, var(--navy2) 30%, var(--amber) 60%, var(--amber2) 85%, #1c1408 100%);
    background-attachment:fixed;
    color:var(--ink);
    min-height:100vh;
    display:flex; flex-direction:column;
  }

  /* ===== Thanh đầu trang ===== */
  header{
    display:flex; flex-wrap:wrap; align-items:center; gap:12px;
    padding:14px 20px;
  }
  header h1{
    font-size:clamp(15px, 2vw, 24px);
    letter-spacing:1px; color:var(--gold); font-weight:800;
    text-transform:uppercase;
  }
  .legend{display:flex; gap:14px; font-size:13px; color:var(--muted); align-items:center;}
  .legend .chip{display:inline-block; width:14px; height:14px; border-radius:4px; vertical-align:-2px; margin-right:5px;}
  .chip.r{background:linear-gradient(180deg,var(--red1),var(--red2));}
  .chip.g{background:linear-gradient(180deg,var(--green1),var(--green2));}
  .spacer{flex:1;}
  button{
    font:inherit; cursor:pointer; border:none; border-radius:8px;
    padding:9px 14px; font-weight:700;
  }
  .btn-print{background:var(--gold); color:#2a1c08;}
  .btn-print:hover{filter:brightness(1.08);}
  .btn-ghost{background:transparent; color:var(--muted); border:1px solid #6b5c3a;}
  .btn-ghost:hover{color:var(--ink); border-color:var(--gold);}
  .datebox{display:flex; align-items:center; gap:7px; font-size:13px; color:var(--muted);}
  .datebox select{
    font:inherit; padding:7px 10px; border-radius:8px;
    border:1px solid #6b5c3a; background:#12162a; color:var(--gold);
    font-weight:700; cursor:pointer;
  }
  .datebox select:focus{outline:none; border-color:var(--gold);}
  .daybtn{padding:7px 10px; font-size:15px; line-height:1;}
  .userchip{font-size:12.5px; color:var(--leaf);}

  #autoStatus{
    position:fixed; right:14px; bottom:12px; z-index:50;
    font-size:12.5px; padding:7px 14px; border-radius:20px;
    background:rgba(18,22,42,.92); border:1px solid #4a4a5a; color:var(--muted);
    opacity:0; transition:opacity .25s; pointer-events:none;
  }
  #autoStatus.show{opacity:1;}
  #autoStatus.ok{color:var(--leaf); border-color:#3f5a2a;}
  #autoStatus.err{color:#e58a7a; border-color:#7a3a2c;}

  #configBanner{
    display:none; margin:0 20px 10px; padding:10px 14px; border-radius:8px;
    background:#3a1810; border:1px solid #7a3a2c; color:#e5a89a; font-size:13px;
  }

  /* ===== Thanh tổng kết ===== */
  .summary{
    display:flex; flex-wrap:wrap; gap:8px 24px;
    padding:0 20px 12px; font-size:14px; color:var(--muted);
  }
  .summary b{color:var(--gold); font-size:17px;}

  /* ===== Lưới bàn ===== */
  main{flex:1; overflow:auto; padding:0 12px 20px;}
  .grid{
    display:grid;
    grid-template-columns:34px repeat(30, minmax(52px, 1fr));
    gap:7px;
    min-width:1500px;
  }
  .rowlabel{
    display:flex; align-items:center; justify-content:center;
    font-size:23px; font-weight:800;
  }
  .rowlabel.r{color:var(--coral);} .rowlabel.g{color:var(--leaf);}
  .groupgap{height:18px; grid-column:1 / -1;}

  .cell{
    position:relative; border-radius:7px; min-height:76px;
    border:1.5px solid #2a1c10;
    padding:17px 3px 4px;
    cursor:pointer;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px;
    transition:transform .08s ease, box-shadow .08s ease;
    color:var(--ink); font:inherit;
  }
  .cell.r{background:linear-gradient(180deg,var(--red1),var(--red2));}
  .cell.g{background:linear-gradient(180deg,var(--green1),var(--green2));}
  .cell:hover{transform:translateY(-2px); box-shadow:0 4px 12px rgba(0,0,0,.5); border-color:var(--gold);}
  .cell:focus-visible{outline:2px solid var(--gold); outline-offset:2px;}
  .cell .num{
    position:absolute; top:3px; left:6px;
    font-size:11px; font-weight:700; opacity:.85;
  }
  .cell .l1{font-size:12px; font-weight:700; line-height:1.15; text-align:center;}
  .cell .l2{font-size:10.5px; line-height:1.2; opacity:.95; text-align:center;}
  .cell.booked{border-color:var(--gold); box-shadow:inset 0 0 0 1px rgba(233,196,106,.4);}

  /* ===== Hộp thoại ===== */
  dialog{
    margin:auto;
    border:1px solid var(--gold); border-radius:12px;
    background:#1d2233; color:var(--ink);
    padding:22px 24px; width:min(92vw, 380px);
  }
  dialog::backdrop{background:rgba(0,0,0,.6);}
  dialog h2{font-size:18px; color:var(--gold); margin-bottom:3px;}
  dialog .price{font-size:12px; color:var(--muted); margin-bottom:12px;}
  .fieldrow{display:flex; gap:12px;}
  .fieldrow > div{flex:1;}
  dialog label{display:block; font-size:12.5px; color:var(--muted); margin:10px 0 4px;}
  dialog input[type=number], dialog input[type=text], dialog input[type=email], dialog input[type=password]{
    width:100%; padding:8px 10px; border-radius:7px;
    border:1px solid #4a4a5a; background:#12162a; color:var(--ink);
    font:inherit;
  }
  dialog input:focus{outline:none; border-color:var(--gold);}
  .hint{font-size:11px; color:#8f866f; margin-top:3px;}
  .sect{margin-top:14px; padding-top:10px; border-top:1px dashed #4a4a5a;
    font-size:12.5px; color:var(--gold); font-weight:700; letter-spacing:.5px;}
  .dlg-actions{display:flex; gap:8px; margin-top:18px;}
  .dlg-actions .btn-print{flex:1;}
  .btn-danger{background:transparent; color:#e58a7a; border:1px solid #7a3a2c;}
  .btn-danger:hover{background:#3a1810;}
  .loginerr{font-size:12px; color:#e58a7a; margin-top:8px; min-height:15px;}

  /* ===== In ấn: A4 ngang, máy in đen trắng ===== */
  #printArea{display:none;}
  @media print{
    @page{size:A4 landscape; margin:7mm;}
    body{background:#fff !important; color:#000; display:block;}
    header, .summary, main, dialog, #autoStatus, #configBanner{display:none !important;}
    #printArea{display:block; font-family:Arial, "Segoe UI", sans-serif; color:#000;}

    .p-head{display:flex; align-items:baseline; gap:14px; margin-bottom:2mm;}
    .p-head h1{font-size:13pt; letter-spacing:.5px; text-transform:uppercase;}
    .p-head .p-legend{font-size:8pt; color:#333;}
    .p-summary{font-size:9pt; margin-bottom:2.5mm;}
    .p-summary b{font-size:10pt;}

    .p-block{margin-bottom:3mm;}
    .p-block-title{font-size:8.5pt; font-weight:700; color:#333; margin-bottom:1mm;
      text-transform:uppercase; letter-spacing:.5px;}
    .p-grid{
      display:grid;
      grid-template-columns:7mm repeat(15, 1fr);
      gap:1mm;
    }
    .p-rowlabel{
      display:flex; align-items:center; justify-content:center;
      font-size:12pt; font-weight:800;
    }
    .p-cell{
      border:0.4mm solid #000; border-radius:1mm;
      min-height:12.5mm; padding:0.6mm 1mm;
      position:relative; overflow:hidden;
      -webkit-print-color-adjust:exact; print-color-adjust:exact;
      display:flex; flex-direction:column; justify-content:center; gap:0;
    }
    .p-cell.g{background:#e6e6e6; border-width:0.25mm;}
    .p-cell .p-num{
      position:absolute; top:0.4mm; left:0.9mm;
      font-size:6.5pt; font-weight:700; color:#000;
    }
    .p-cell .p-people{font-size:8.5pt; font-weight:800; text-align:center; line-height:1.1;}
    .p-cell .p-extra{font-size:6.5pt; text-align:center; line-height:1.15; color:#111;}
    .p-cell.empty .p-num{color:#777; font-weight:400;}
  }
</style>
</head>
<body>

<header>
  <h1>Sơ đồ Dạ Tiệc Ánh Sáng Biển Đêm</h1>
  <div class="legend">
    <span><span class="chip r"></span>A–D: 199K/người (có bếp nướng)</span>
    <span><span class="chip g"></span>E–F: 129K/người (không bếp nướng)</span>
  </div>
  <div class="spacer"></div>
  <label class="datebox">Đêm tiệc
    <button class="btn-ghost daybtn" id="btnPrevDay" title="Đêm trước">◀</button>
    <select id="fDate" title="Chọn đêm để xem sơ đồ của đêm đó"></select>
    <button class="btn-ghost daybtn" id="btnNextDay" title="Đêm sau">▶</button>
  </label>
  <span class="userchip" id="userChip"></span>
  <button class="btn-ghost" id="btnImport" hidden>📂 Nhập JSON</button>
  <input type="file" id="fileImport" accept=".json,application/json" hidden>
  <button class="btn-ghost" id="btnClear" hidden>Xóa ngày này</button>
  <button class="btn-print" id="btnPrint">🖨 In sơ đồ</button>
  <button class="btn-ghost" id="btnAuth">Đăng nhập</button>
</header>

<div id="configBanner"></div>
<div class="summary" id="summary"></div>

<main><div class="grid" id="grid"></div></main>

<div id="autoStatus"></div>
<div id="printArea"></div>

<!-- Hộp thoại nhập liệu 1 ô -->
<dialog id="dlg">
  <h2 id="dlgTitle">Vị trí A1</h2>
  <div class="price" id="dlgPrice"></div>

  <div class="fieldrow">
    <div>
      <label for="fPeople">Số người</label>
      <input type="number" id="fPeople" min="0" max="99" step="1" placeholder="0">
    </div>
    <div>
      <label for="fTables">Số bàn</label>
      <input type="number" id="fTables" min="0" max="99" step="1" placeholder="0">
    </div>
    <div>
      <label for="fStoves">Số bếp</label>
      <input type="number" id="fStoves" min="0" max="99" step="1" placeholder="0">
    </div>
  </div>
  <div class="hint">Số bàn và số bếp tự tính theo số người, bạn sửa lại được tùy ý.</div>

  <div class="sect">Đồ ăn thêm</div>
  <div class="fieldrow">
    <div>
      <label for="fBeer">Bia (lon)</label>
      <input type="number" id="fBeer" min="0" max="999" step="1" placeholder="0">
    </div>
    <div>
      <label for="fSquid">Mực (set)</label>
      <input type="number" id="fSquid" min="0" max="999" step="1" placeholder="0">
    </div>
  </div>

  <div class="dlg-actions">
    <button class="btn-print" id="btnSave">Lưu</button>
    <button class="btn-danger" id="btnDelete">Xóa bàn</button>
    <button class="btn-ghost" id="btnClose">Đóng</button>
  </div>
</dialog>

<!-- Hộp thoại đăng nhập -->
<dialog id="dlgLogin">
  <h2>Đăng nhập</h2>
  <div class="price">Chỉ người đăng nhập mới chỉnh sửa được sơ đồ. Mọi người khác vẫn xem bình thường.</div>
  <label for="lEmail">Email</label>
  <input type="email" id="lEmail" placeholder="ten@quan.com" autocomplete="username">
  <label for="lPass">Mật khẩu</label>
  <input type="password" id="lPass" autocomplete="current-password">
  <div class="loginerr" id="loginErr"></div>
  <div class="dlg-actions">
    <button class="btn-print" id="btnDoLogin">Đăng nhập</button>
    <button class="btn-ghost" id="btnLoginClose">Đóng</button>
  </div>
</dialog>

<script>
/* ================================================================
   CẤU HÌNH — CHỈ CẦN SỬA 1 DÒNG DƯỚI ĐÂY
   Lấy Web API Key: Firebase console → ⚙️ Project settings → General
   → mục "Web API Key" → copy chuỗi (dạng AIzaSy...) dán thay thế.
   ================================================================ */
const FIREBASE_API_KEY = "AIzaSyCnGVjxOrrdOcY-EQY6CuTq6Ao2dHfsZ6c";
const FIREBASE_DB_URL  = "https://so-do-tiec-default-rtdb.asia-southeast1.firebasedatabase.app";
/* ================================================================ */

const ROWS = [
  {name:'A', cls:'r', desc:'199K/người · có bếp nướng', grill:true},
  {name:'B', cls:'r', desc:'199K/người · có bếp nướng', grill:true},
  {name:'C', cls:'r', desc:'199K/người · có bếp nướng', grill:true},
  {name:'D', cls:'r', desc:'199K/người · có bếp nướng', grill:true},
  {name:'E', cls:'g', desc:'129K/người · không bếp nướng', grill:false},
  {name:'F', cls:'g', desc:'129K/người · không bếp nướng', grill:false},
];
const COLS = 30;
const ROW_BY_NAME = {}; ROWS.forEach(r => ROW_BY_NAME[r.name] = r);

/* Chỉ giới hạn đúng 3 đêm tiệc. Muốn thêm/bớt đêm, sửa danh sách này. */
const NIGHTS = ['2026-07-24', '2026-07-25', '2026-07-26'];
function nightLabel(d){
  const p = d.split('-');
  return p[2] + '/' + p[1] + '/' + p[0];
}
const fDateSelect = document.getElementById('fDate');
NIGHTS.forEach(d => {
  const opt = document.createElement('option');
  opt.value = d; opt.textContent = 'Đêm ' + nightLabel(d);
  fDateSelect.appendChild(opt);
});

let data = {};          /* dữ liệu của NGÀY đang xem: { "A1": {...} } */
let currentUser = null;
let currentDate = '';   /* dạng "2026-07-24" — mỗi ngày một sơ đồ riêng */
const KEY_LASTDATE = 'seatmap_last_date';

/* ---- công thức gợi ý ---- */
function suggestTables(p){
  if(!p || p <= 0) return 0;
  if(p <= 4) return 1;
  if(p <= 7) return 2;
  if(p <= 10) return 3;
  return Math.ceil(p / 3.5);
}
/* 1-4 người: 1 bếp · 5-8: 2 bếp · 9-10: 3 bếp (chỉ khu A-D có bếp nướng) */
function suggestStoves(p, grill){
  if(!grill || !p || p <= 0) return 0;
  if(p <= 4) return 1;
  if(p <= 8) return 2;
  if(p <= 10) return 3;
  return Math.ceil(p / 4);
}

/* ---- dựng lưới ---- */
const grid = document.getElementById('grid');
ROWS.forEach(row => {
  if(row.name === 'E'){
    const gap = document.createElement('div');
    gap.className = 'groupgap';
    grid.appendChild(gap);
  }
  const lbl = document.createElement('div');
  lbl.className = 'rowlabel ' + row.cls;
  lbl.textContent = row.name;
  grid.appendChild(lbl);
  for(let c = 1; c <= COLS; c++){
    const id = row.name + c;
    const cell = document.createElement('button');
    cell.type = 'button';
    cell.className = 'cell ' + row.cls;
    cell.id = 'cell-' + id;
    cell.innerHTML =
      '<span class="num">' + c + '</span>' +
      '<span class="l1"></span>' +
      '<span class="l2 l2a"></span>' +
      '<span class="l2 l2b"></span>';
    cell.addEventListener('click', () => onCellClick(id, row));
    grid.appendChild(cell);
  }
});

function isBooked(d){
  return d && (d.people || d.tables || d.stoves || d.beer || d.squid);
}

function renderCell(id){
  const cell = document.getElementById('cell-' + id);
  const d = data[id];
  cell.classList.toggle('booked', !!isBooked(d));
  const l1 = cell.querySelector('.l1');
  const a = cell.querySelector('.l2a');
  const b = cell.querySelector('.l2b');
  if(isBooked(d)){
    const p1 = [];
    if(d.people) p1.push(d.people + ' người');
    if(d.tables) p1.push(d.tables + ' bàn');
    l1.textContent = p1.join(' · ');
    a.textContent = d.stoves ? d.stoves + ' bếp' : '';
    const p3 = [];
    if(d.beer)  p3.push(d.beer + '🍺');
    if(d.squid) p3.push(d.squid + '🦑');
    b.textContent = p3.join(' · ');
  }else{
    l1.textContent = ''; a.textContent = ''; b.textContent = '';
  }
}
function renderAll(){
  ROWS.forEach(r => { for(let c = 1; c <= COLS; c++) renderCell(r.name + c); });
  renderSummary();
}

function totals(){
  let spots = 0, people = 0, tables = 0, stoves = 0, beer = 0, squid = 0;
  ROWS.forEach(row => {
    for(let c = 1; c <= COLS; c++){
      const d = data[row.name + c];
      if(isBooked(d)){
        spots++; people += d.people||0; tables += d.tables||0;
        stoves += d.stoves||0; beer += d.beer||0; squid += d.squid||0;
      }
    }
  });
  return {spots, people, tables, stoves, beer, squid};
}
function renderSummary(){
  const t = totals();
  document.getElementById('summary').innerHTML =
    'Ngày <b>' + (displayDate() || '—') + '</b> &nbsp;·&nbsp; ' +
    'Vị trí đã đặt: <b>' + t.spots + '</b>/' + (ROWS.length * COLS) + ' &nbsp;·&nbsp; ' +
    'Tổng số người: <b>' + t.people + '</b> &nbsp;·&nbsp; ' +
    'Tổng số bàn: <b>' + t.tables + '</b> &nbsp;·&nbsp; ' +
    'Tổng số bếp: <b>' + t.stoves + '</b> &nbsp;·&nbsp; ' +
    'Bia: <b>' + t.beer + '</b> lon &nbsp;·&nbsp; ' +
    'Mực: <b>' + t.squid + '</b> set';
}

/* ---- thông báo góc phải ---- */
const autoStatus = document.getElementById('autoStatus');
let statusTimer = null;
function flashStatus(msg, cls, sticky){
  autoStatus.textContent = msg;
  autoStatus.className = 'show' + (cls ? ' ' + cls : '');
  clearTimeout(statusTimer);
  if(!sticky) statusTimer = setTimeout(() => { autoStatus.className = ''; }, 3000);
}

/* ---- Firebase ---- */
const fDate = fDateSelect;
let auth = null, dbListener = null, dbListenerRef = null;
const configOk = FIREBASE_API_KEY && FIREBASE_API_KEY.indexOf('DAN_') !== 0;

function dayRef(){
  return firebase.database().ref('seatmaps/' + currentDate);
}
function cacheKey(){ return 'seatmap_fb_cache_' + currentDate; }

/* chuyển sang xem/theo dõi một ngày khác */
function attachDay(dateStr){
  if(!dateStr) return;
  currentDate = dateStr;
  fDate.value = dateStr;
  try{ localStorage.setItem(KEY_LASTDATE, dateStr); }catch(e){}

  /* hiện ngay từ cache trong lúc chờ mạng */
  data = {};
  try{
    const c = JSON.parse(localStorage.getItem(cacheKey()));
    if(c && c.cells) data = c.cells;
  }catch(e){}
  renderAll();

  if(!configOk) return;
  /* gỡ listener ngày cũ, gắn listener ngày mới */
  if(dbListenerRef && dbListener) dbListenerRef.off('value', dbListener);
  dbListenerRef = dayRef();
  dbListener = dbListenerRef.on('value', snap => {
    const v = snap.val() || {};
    data = v.cells || {};
    try{ localStorage.setItem(cacheKey(), JSON.stringify({cells:data})); }catch(e){}
    renderAll();
  }, err => {
    flashStatus('⚠ Không kết nối được dữ liệu: ' + err.message, 'err', true);
  });
}

if(configOk){
  firebase.initializeApp({apiKey:FIREBASE_API_KEY, databaseURL:FIREBASE_DB_URL});
  auth = firebase.auth();
  auth.onAuthStateChanged(u => {
    currentUser = u;
    setAuthUI();
    if(u) migrateLegacy();
  });
}else{
  document.getElementById('configBanner').style.display = 'block';
  document.getElementById('configBanner').innerHTML =
    '⚠ <b>Chưa cấu hình Web API Key.</b> Mở file index.html trên GitHub (biểu tượng cây bút ✏️), ' +
    'tìm dòng <code>FIREBASE_API_KEY</code> gần đầu phần &lt;script&gt; và dán Web API Key của bạn vào ' +
    '(lấy tại Firebase console → ⚙️ Project settings → General → Web API Key), rồi Commit.';
}

/* chuyển dữ liệu cũ (bản 1 ngày, nhánh "seatmap") sang cấu trúc mới "seatmaps/{ngày}"
   — chạy 1 lần duy nhất khi quản trị viên đăng nhập */
function migrateLegacy(){
  const legacy = firebase.database().ref('seatmap');
  legacy.once('value').then(snap => {
    const v = snap.val();
    if(!v || !v.cells) return;
    const target = v.event_date || '2026-07-24';
    const tref = firebase.database().ref('seatmaps/' + target + '/cells');
    tref.once('value').then(tsnap => {
      const done = () => legacy.remove();
      if(tsnap.exists()){ done(); return; }
      tref.set(v.cells).then(() => {
        done();
        flashStatus('✔ Đã chuyển dữ liệu cũ sang ngày ' + target, 'ok');
        if(currentDate === target) attachDay(target);
      });
    });
  }).catch(() => {});
}

function setAuthUI(){
  const on = !!currentUser;
  document.getElementById('btnAuth').textContent = on ? 'Đăng xuất' : 'Đăng nhập';
  document.getElementById('userChip').textContent = on ? '● ' + (currentUser.email || '') : '';
  document.getElementById('btnImport').hidden = !on;
  document.getElementById('btnClear').hidden = !on;
}

function requireLogin(){
  if(!configOk){ flashStatus('⚠ Trang chưa cấu hình xong (thiếu API Key)', 'err'); return false; }
  if(!currentUser){
    flashStatus('🔒 Đăng nhập để chỉnh sửa', 'err');
    openLogin();
    return false;
  }
  return true;
}

/* ghi 1 ô của ngày đang xem lên Firebase */
function writeCell(id, d){
  const ref = dayRef().child('cells/' + id);
  const op = d ? ref.set(d) : ref.remove();
  flashStatus('☁ Đang lưu...', '', true);
  op.then(() => flashStatus('✔ Đã lưu ' + new Date().toLocaleTimeString('vi-VN'), 'ok'))
    .catch(err => flashStatus('⚠ Lưu lỗi: ' + err.message, 'err', true));
}

/* ---- chọn đêm (chỉ trong 3 đêm cố định) ---- */
function shiftDay(delta){
  let idx = NIGHTS.indexOf(currentDate);
  if(idx === -1) idx = 0;
  idx = Math.min(NIGHTS.length - 1, Math.max(0, idx + delta));
  attachDay(NIGHTS[idx]);
}
fDate.addEventListener('change', () => { if(fDate.value) attachDay(fDate.value); });
document.getElementById('btnPrevDay').addEventListener('click', () => shiftDay(-1));
document.getElementById('btnNextDay').addEventListener('click', () => shiftDay(1));

/* ---- hộp thoại nhập liệu ---- */
const dlg = document.getElementById('dlg');
const fPeople = document.getElementById('fPeople');
const fTables = document.getElementById('fTables');
const fStoves = document.getElementById('fStoves');
const fBeer   = document.getElementById('fBeer');
const fSquid  = document.getElementById('fSquid');
let currentId = null, currentRow = null;
let tablesEdited = false, stovesEdited = false;

function onCellClick(id, row){
  if(!requireLogin()) return;
  currentId = id; currentRow = row;
  tablesEdited = false; stovesEdited = false;
  const d = data[id] || {};
  document.getElementById('dlgTitle').textContent = 'Vị trí ' + id + ' — ' + displayDate();
  document.getElementById('dlgPrice').textContent = row.desc;
  fPeople.value = d.people || '';
  fTables.value = d.tables || '';
  fStoves.value = d.stoves || '';
  fBeer.value   = d.beer   || '';
  fSquid.value  = d.squid  || '';
  dlg.showModal();
  fPeople.focus(); fPeople.select();
}

fPeople.addEventListener('input', () => {
  const p = parseInt(fPeople.value, 10) || 0;
  if(!tablesEdited) fTables.value = suggestTables(p) || '';
  if(!stovesEdited) fStoves.value = suggestStoves(p, currentRow.grill) || '';
});
fTables.addEventListener('input', () => { tablesEdited = true; });
fStoves.addEventListener('input', () => { stovesEdited = true; });

function num(el, max){
  let v = parseInt(el.value, 10);
  if(isNaN(v) || v < 0) v = 0;
  if(v > max) v = max;
  return v;
}

document.getElementById('btnSave').addEventListener('click', () => {
  if(!requireLogin()) return;
  const d = {
    people:num(fPeople, 99), tables:num(fTables, 99), stoves:num(fStoves, 99),
    beer:num(fBeer, 999), squid:num(fSquid, 999)
  };
  const val = isBooked(d) ? d : null;
  if(val) data[currentId] = d; else delete data[currentId];
  renderCell(currentId); renderSummary(); dlg.close();
  writeCell(currentId, val);
});
document.getElementById('btnDelete').addEventListener('click', () => {
  if(!requireLogin()) return;
  delete data[currentId];
  renderCell(currentId); renderSummary(); dlg.close();
  writeCell(currentId, null);
});
document.getElementById('btnClose').addEventListener('click', () => dlg.close());
dlg.addEventListener('keydown', e => {
  if(e.key === 'Enter'){ e.preventDefault(); document.getElementById('btnSave').click(); }
});

/* ---- đăng nhập / đăng xuất ---- */
const dlgLogin = document.getElementById('dlgLogin');
const lEmail = document.getElementById('lEmail');
const lPass  = document.getElementById('lPass');
const loginErr = document.getElementById('loginErr');

function openLogin(){
  if(!configOk) return;
  loginErr.textContent = '';
  lPass.value = '';
  dlgLogin.showModal();
  (lEmail.value ? lPass : lEmail).focus();
}
document.getElementById('btnAuth').addEventListener('click', () => {
  if(!configOk){ flashStatus('⚠ Thiếu API Key, xem hướng dẫn đầu trang', 'err'); return; }
  if(currentUser){ auth.signOut(); flashStatus('Đã đăng xuất'); }
  else openLogin();
});
document.getElementById('btnDoLogin').addEventListener('click', async () => {
  loginErr.textContent = '';
  try{
    await auth.signInWithEmailAndPassword(lEmail.value.trim(), lPass.value);
    dlgLogin.close();
    flashStatus('✔ Đăng nhập thành công', 'ok');
  }catch(err){
    const m = {
      'auth/invalid-credential':'Sai email hoặc mật khẩu.',
      'auth/wrong-password':'Sai mật khẩu.',
      'auth/user-not-found':'Không tìm thấy tài khoản này.',
      'auth/invalid-email':'Email không hợp lệ.',
      'auth/too-many-requests':'Thử sai quá nhiều, đợi một lát rồi thử lại.'
    };
    loginErr.textContent = m[err.code] || ('Lỗi: ' + err.message);
  }
});
document.getElementById('btnLoginClose').addEventListener('click', () => dlgLogin.close());
dlgLogin.addEventListener('keydown', e => {
  if(e.key === 'Enter'){ e.preventDefault(); document.getElementById('btnDoLogin').click(); }
});

/* ---- nhập JSON: nạp vào đúng ngày ghi trong file (event_date),
        không có thì nạp vào ngày đang xem ---- */
document.getElementById('btnImport').addEventListener('click', () => {
  document.getElementById('fileImport').click();
});
document.getElementById('fileImport').addEventListener('change', e => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const obj = JSON.parse(reader.result);
      const incoming = obj && obj.data ? obj.data : obj;
      if(typeof incoming !== 'object' || incoming === null) throw new Error('sai định dạng');
      Object.keys(incoming).forEach(k => {
        const d = incoming[k];
        const row = ROW_BY_NAME[k.charAt(0)];
        if(d && row && !d.stoves) d.stoves = suggestStoves(d.people || 0, row.grill);
      });
      const target = (obj.event_date && NIGHTS.indexOf(obj.event_date) !== -1)
        ? obj.event_date : currentDate;
      flashStatus('☁ Đang nạp lên ngày ' + target + '...', '', true);
      firebase.database().ref('seatmaps/' + target + '/cells').update(incoming)
        .then(() => {
          flashStatus('✔ Đã nạp ' + Object.keys(incoming).length + ' vị trí vào ngày ' + target, 'ok');
          if(target !== currentDate) attachDay(target);
        })
        .catch(err => flashStatus('⚠ ' + err.message, 'err', true));
    }catch(err){
      alert('File không đúng định dạng JSON của sơ đồ này.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

/* ---- xóa toàn bộ ngày đang xem ---- */
document.getElementById('btnClear').addEventListener('click', () => {
  if(!requireLogin()) return;
  if(confirm('Xóa toàn bộ dữ liệu của ngày ' + displayDate() + '? (các ngày khác không bị ảnh hưởng)')){
    dayRef().child('cells').remove()
      .then(() => flashStatus('✔ Đã xóa dữ liệu ngày ' + displayDate(), 'ok'))
      .catch(err => flashStatus('⚠ ' + err.message, 'err', true));
  }
});

/* ---- bố cục in: 2 khối 15 cột ---- */
function displayDate(){
  if(!currentDate) return '';
  const parts = currentDate.split('-');
  return parts[2] + '/' + parts[1] + '/' + parts[0];
}
function buildPrintArea(){
  const area = document.getElementById('printArea');
  const t = totals();

  function block(from, to){
    let h = '<div class="p-block">' +
      '<div class="p-block-title">Vị trí ' + from + ' – ' + to + '</div>' +
      '<div class="p-grid">';
    ROWS.forEach(row => {
      h += '<div class="p-rowlabel">' + row.name + '</div>';
      for(let c = from; c <= to; c++){
        const d = data[row.name + c];
        const booked = isBooked(d);
        h += '<div class="p-cell ' + row.cls + (booked ? '' : ' empty') + '">' +
             '<span class="p-num">' + c + '</span>';
        if(booked){
          const l1 = [], l2 = [];
          if(d.people) l1.push(d.people + ' người');
          if(d.tables) l1.push(d.tables + ' bàn');
          if(d.stoves) l2.push(d.stoves + ' bếp');
          if(d.beer)   l2.push(d.beer + ' bia');
          if(d.squid)  l2.push(d.squid + ' mực');
          if(l1.length) h += '<span class="p-people">' + l1.join(' · ') + '</span>';
          if(l2.length) h += '<span class="p-extra">' + l2.join(' · ') + '</span>';
        }
        h += '</div>';
      }
    });
    return h + '</div></div>';
  }

  area.innerHTML =
    '<div class="p-head">' +
      '<h1>Sơ đồ Dạ Tiệc Ánh Sáng Biển Đêm' +
        (displayDate() ? ' — Ngày ' + displayDate() : '') + '</h1>' +
      '<span class="p-legend">A–D: 199K/người, có bếp nướng (ô trắng, viền đậm) &nbsp;·&nbsp; ' +
      'E–F: 129K/người, không bếp nướng (ô xám)</span>' +
    '</div>' +
    '<div class="p-summary">' +
      'Đã đặt: <b>' + t.spots + '</b>/' + (ROWS.length * COLS) +
      ' &nbsp;·&nbsp; Người: <b>' + t.people + '</b>' +
      ' &nbsp;·&nbsp; Bàn: <b>' + t.tables + '</b>' +
      ' &nbsp;·&nbsp; Bếp: <b>' + t.stoves + '</b>' +
      ' &nbsp;·&nbsp; Bia: <b>' + t.beer + '</b> lon' +
      ' &nbsp;·&nbsp; Mực: <b>' + t.squid + '</b> set' +
    '</div>' +
    block(1, 15) + block(16, 30);
}
window.addEventListener('beforeprint', buildPrintArea);
document.getElementById('btnPrint').addEventListener('click', () => {
  buildPrintArea();
  window.print();
});

/* ---- khởi tạo: mở đêm xem lần trước nếu hợp lệ, không thì đêm đầu tiên ---- */
let startDate = '';
try{ startDate = localStorage.getItem(KEY_LASTDATE) || ''; }catch(e){}
if(NIGHTS.indexOf(startDate) === -1){
  startDate = NIGHTS[0];
}
setAuthUI();
attachDay(startDate);
</script>
